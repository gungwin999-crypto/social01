<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成語填字｜書卷挑戰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #efe0bd;
      --paper-light: #fff9e9;
      --paper-deep: #ddc798;
      --ink: #352b23;
      --muted: #7f6b58;
      --red: #a63f35;
      --red-light: #d06b5d;
      --wood: #b98752;
      --wood-dark: #795033;
      --gold: #c89a48;
      --green: #527c59;
      --green-light: #dcebd9;
      --shadow: 0 20px 55px rgba(79, 54, 31, .2);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 20%, rgba(107,79,45,.055) 0 1px, transparent 2px),
        radial-gradient(circle at 72% 62%, rgba(107,79,45,.045) 0 1px, transparent 2px),
        repeating-linear-gradient(3deg, transparent 0 17px, rgba(109,80,48,.025) 18px 19px),
        var(--paper);
      background-size: 31px 31px, 43px 43px, auto, auto;
      font-family: "Noto Serif TC", "PMingLiU", serif;
      user-select: none;
      overscroll-behavior: none;
    }

    button { font: inherit; }

    .page {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      padding: 15px 19px;
      border: 2px solid var(--wood-dark);
      background: rgba(255,249,233,.76);
      box-shadow: var(--shadow), inset 0 0 0 5px rgba(185,135,82,.1);
    }

    .title-wrap { display: flex; align-items: center; gap: 13px; }

    .seal {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 3px double #f0b3a8;
      color: #fff3e8;
      background: var(--red);
      box-shadow: inset 0 0 0 3px #722a25;
      font-size: 1.5rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      color: #5b3929;
      font-size: clamp(1.55rem, 5vw, 2.4rem);
      letter-spacing: .14em;
    }

    .subtitle { margin: 3px 0 0; color: var(--muted); font-size: .77rem; }

    .progress {
      min-width: 112px;
      padding: 8px 12px;
      border: 1px solid #98704d;
      background: #fff8e8;
      text-align: center;
    }

    .progress span { color: var(--muted); font-size: .68rem; }
    .progress strong { display: block; color: var(--red); font-size: 1.25rem; }

    .game {
      position: relative;
      overflow: hidden;
      border: 2px solid var(--wood-dark);
      background:
        linear-gradient(90deg, rgba(255,255,255,.34), transparent 45%),
        rgba(255,249,233,.9);
      box-shadow: var(--shadow), inset 0 0 0 7px rgba(185,135,82,.1);
    }

    .question-area {
      padding: 28px 24px 23px;
      border-bottom: 2px solid rgba(121,80,51,.28);
      text-align: center;
    }

    .question-label {
      margin-bottom: 17px;
      color: var(--muted);
      font-size: .76rem;
      letter-spacing: .16em;
    }

    .idiom {
      min-height: 104px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: clamp(8px, 2vw, 15px);
    }

    .idiom-char,
    .blank {
      width: clamp(60px, 12vw, 88px);
      height: clamp(60px, 12vw, 88px);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      font-size: clamp(2rem, 7vw, 3.4rem);
      font-weight: 900;
    }

    .idiom-char { color: #30251d; }

    .blank {
      position: relative;
      border: 3px solid var(--red);
      color: rgba(166,63,53,.35);
      background:
        linear-gradient(45deg, transparent calc(50% - 1px), rgba(166,63,53,.22) 50%, transparent calc(50% + 1px)),
        linear-gradient(-45deg, transparent calc(50% - 1px), rgba(166,63,53,.22) 50%, transparent calc(50% + 1px)),
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(166,63,53,.22) 50%, transparent calc(50% + 1px)),
        linear-gradient(transparent calc(50% - 1px), rgba(166,63,53,.22) 50%, transparent calc(50% + 1px)),
        rgba(255,249,233,.82);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .blank::before { content: "□"; opacity: .45; }

    .blank.drag-over,
    .blank.selected-target {
      box-shadow: 0 0 0 5px rgba(200,154,72,.25), 0 0 24px rgba(166,63,53,.18);
      transform: translateY(-3px);
    }

    .blank.correct {
      color: var(--red);
      background: rgba(255,247,229,.92);
      box-shadow: inset 0 0 0 3px rgba(166,63,53,.1);
      animation: stampIn .38s cubic-bezier(.2,.85,.3,1.25);
    }

    .blank.correct::before { content: ""; }
    .blank.wrong { animation: wrongFlash .2s ease; }

    .cards-area { padding: 21px; }

    .cards-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: .74rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 11px;
    }

    .char-card {
      min-height: 65px;
      display: grid;
      place-items: center;
      border: 2px solid var(--wood-dark);
      border-radius: 5px;
      color: #2f251e;
      background:
        repeating-linear-gradient(3deg, transparent 0 12px, rgba(121,80,51,.055) 13px 14px),
        linear-gradient(135deg, rgba(255,255,255,.55), transparent 55%),
        #edcf93;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.2), 0 5px 0 #9d7045;
      cursor: grab;
      touch-action: none;
      font-size: 1.75rem;
      font-weight: 900;
      transition: transform .12s ease, opacity .12s ease, border-color .12s ease;
    }

    .char-card:hover { transform: translateY(-2px); border-color: var(--red); }
    .char-card:active { cursor: grabbing; transform: translateY(3px); }
    .char-card.drag-source { opacity: .25; }
    .char-card.selected {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(166,63,53,.17), 0 5px 0 #9d7045;
    }

    .drag-ghost {
      position: fixed;
      z-index: 80;
      width: 65px;
      height: 65px;
      display: grid;
      place-items: center;
      border: 2px solid var(--red);
      border-radius: 5px;
      color: #2f251e;
      background: #edcf93;
      box-shadow: 0 12px 28px rgba(64,42,26,.28);
      font-size: 1.8rem;
      font-weight: 900;
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(-3deg);
    }

    .answer-panel {
      display: none;
      margin-top: 20px;
      padding: 18px 20px;
      border: 1px solid #a77a50;
      border-left: 6px solid var(--red);
      background: #fff8e8;
      text-align: left;
      animation: reveal .35s ease;
    }

    .answer-panel.show { display: block; }

    .correct-title {
      margin-bottom: 8px;
      color: var(--green);
      font-size: 1.25rem;
      font-weight: 900;
    }

    .meaning { margin: 0 0 14px; color: #5f4b3d; line-height: 1.8; }

    .next-button,
    .restart-button {
      min-width: 145px;
      min-height: 44px;
      border: 2px solid #772c27;
      color: #fff4e7;
      background: var(--red);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.08), 0 4px 0 #6a2723;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .next-button:hover,
    .restart-button:hover { filter: brightness(1.08); }

    .result {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(64,43,28,.66);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      transition: opacity .22s ease, visibility .22s ease;
    }

    .result.open { opacity: 1; visibility: visible; }

    .result-card {
      width: min(100%, 430px);
      padding: 32px 27px;
      border: 4px double var(--wood-dark);
      background:
        repeating-linear-gradient(3deg, transparent 0 16px, rgba(121,80,51,.035) 17px 18px),
        var(--paper-light);
      box-shadow: var(--shadow), inset 0 0 0 7px rgba(185,135,82,.13);
      text-align: center;
      animation: resultIn .45s cubic-bezier(.2,.85,.3,1.2);
    }

    .result-seal {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      border: 4px double #f1aaa1;
      border-radius: 50%;
      color: #fff5e8;
      background: var(--red);
      font-size: 2.1rem;
      font-weight: 900;
    }

    .result h2 { margin: 0 0 8px; color: #5b3929; font-size: 2rem; }
    .result p { margin: 0 0 21px; color: var(--muted); line-height: 1.8; }
    .result strong { color: var(--red); font-size: 1.35rem; }

    @keyframes stampIn {
      0% { opacity: .2; transform: scale(1.5) rotate(-8deg); }
      70% { transform: scale(.92) rotate(2deg); }
      100% { opacity: 1; transform: none; }
    }

    @keyframes wrongFlash {
      0%, 100% { background-color: rgba(255,249,233,.82); transform: translateX(0); }
      35% { background-color: #f3aaa0; transform: translateX(-5px); }
      70% { background-color: #f3aaa0; transform: translateX(5px); }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    @keyframes resultIn {
      from { opacity: 0; transform: scale(.78) translateY(16px); }
      to { opacity: 1; transform: none; }
    }

    .map-return {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 90;
      padding: 9px 13px;
      border: 2px solid var(--wood-dark);
      color: #5b3929;
      background: var(--paper-light);
      box-shadow: 0 5px 14px rgba(79,54,31,.18);
      text-decoration: none;
      font-size: .82rem;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .page { width: min(100% - 16px, 1040px); padding-top: 8px; }
      .header { padding: 11px 13px; }
      .seal { width: 42px; height: 42px; font-size: 1.2rem; }
      .subtitle { display: none; }
      .progress { min-width: 82px; padding: 6px; }
      .question-area { padding: 21px 9px 18px; }
      .idiom { gap: 6px; }
      .idiom-char, .blank { width: clamp(55px, 20vw, 76px); height: clamp(55px, 20vw, 76px); }
      .cards-area { padding: 14px 11px 18px; }
      .cards-grid { grid-template-columns: repeat(5, 1fr); gap: 7px; }
      .char-card { min-height: 54px; font-size: 1.45rem; }
    }

    @media (max-width: 430px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); }
      .cards-label { align-items: flex-start; flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <a class="map-return" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <main class="page">
    <header class="header">
      <div class="title-wrap">
        <div class="seal" aria-hidden="true">文</div>
        <div>
          <h1>成語填字</h1>
          <p class="subtitle">拖曳正確字卡，補完成語並讀懂典故。</p>
        </div>
      </div>
      <div class="progress">
        <span>本場進度</span>
        <strong><span id="currentNumber">1</span> / 5</strong>
      </div>
    </header>

    <section class="game">
      <div class="question-area">
        <div class="question-label">請填入缺少的字</div>
        <div class="idiom" id="idiomDisplay"></div>
        <div class="answer-panel" id="answerPanel">
          <div class="correct-title">✓ 答對！</div>
          <p class="meaning" id="meaningText"></p>
          <button class="next-button" id="nextButton">下一題</button>
        </div>
      </div>

      <div class="cards-area">
        <div class="cards-label">
          <span>備選字卡（共 15 張）</span>
          <span>拖曳字卡至紅色米字格；也可依序點選字卡與空格。</span>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
      </div>
    </section>
  </main>

  <div class="result" id="result" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result-card">
      <div class="result-seal" aria-hidden="true">滿</div>
      <h2 id="resultTitle">挑戰完成</h2>
      <p>你完成了 <strong>5 / 5</strong> 題成語填字！<br>答錯嘗試共 <strong id="wrongTotal">0</strong> 次。</p>
      <button class="restart-button" id="restartButton">重新挑戰</button>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { 成語: "大眼瞪小眼", 缺字: [2, 4], 答案: ["瞪", "眼"], 意思: "比喻眾人因驚訝、無奈或不知所措而互相瞪視。" },
      { 成語: "夢寐以求", 缺字: [0, 1], 答案: ["夢", "寐"], 意思: "指在睡夢中都在尋找與追求，形容願望十分迫切。" },
      { 成語: "三番五次", 缺字: [1, 3], 答案: ["番", "次"], 意思: "形容次數很多，一再發生。" },
      { 成語: "一字千金", 缺字: [1, 3], 答案: ["字", "金"], 意思: "形容文字價值極高，或文章寫得十分出色。" },
      { 成語: "畫龍點睛", 缺字: [1, 3], 答案: ["龍", "睛"], 意思: "比喻在關鍵處加上一筆，使內容更加生動有力。" },
      { 成語: "井底之蛙", 缺字: [0, 3], 答案: ["井", "蛙"], 意思: "比喻見識狹窄、眼界不廣的人。" },
      { 成語: "守株待兔", 缺字: [1, 3], 答案: ["株", "兔"], 意思: "比喻拘泥舊經驗，不知變通，或妄想不勞而獲。" },
      { 成語: "亡羊補牢", 缺字: [1, 3], 答案: ["羊", "牢"], 意思: "比喻出了問題後設法補救，仍然不算太遲。" },
      { 成語: "狐假虎威", 缺字: [0, 2], 答案: ["狐", "虎"], 意思: "比喻倚仗別人的權勢來欺壓人。" },
      { 成語: "對牛彈琴", 缺字: [1, 3], 答案: ["牛", "琴"], 意思: "比喻對不懂道理的人講道理，白費口舌。" },
      { 成語: "一石二鳥", 缺字: [1, 3], 答案: ["石", "鳥"], 意思: "比喻做一件事同時得到兩種好處。" },
      { 成語: "掩耳盜鈴", 缺字: [1, 3], 答案: ["耳", "鈴"], 意思: "比喻自己欺騙自己，以為別人也不知道。" },
      { 成語: "胸有成竹", 缺字: [0, 3], 答案: ["胸", "竹"], 意思: "比喻做事前已有完整的計畫和把握。" },
      { 成語: "水落石出", 缺字: [1, 2], 答案: ["落", "石"], 意思: "比喻事情的真相完全顯露出來。" }
    ];

    const DISTRACTOR_POOL = [
      "天", "地", "人", "心", "口", "手", "日", "月", "山", "海", "風", "雨", "花", "木", "火",
      "馬", "魚", "鳥", "龍", "虎", "門", "頭", "目", "光", "生", "前", "後", "左", "右", "高",
      "低", "長", "短", "多", "少", "白", "黑", "青", "紅", "明", "安", "平", "知", "行", "成"
    ];

    const idiomDisplay = document.getElementById("idiomDisplay");
    const cardsGrid = document.getElementById("cardsGrid");
    const currentNumber = document.getElementById("currentNumber");
    const answerPanel = document.getElementById("answerPanel");
    const meaningText = document.getElementById("meaningText");
    const nextButton = document.getElementById("nextButton");
    const result = document.getElementById("result");
    const wrongTotalDisplay = document.getElementById("wrongTotal");
    const restartButton = document.getElementById("restartButton");

    let roundQuestions = [];
    let questionIndex = 0;
    let filledSlots = new Set();
    let wrongAttempts = 0;
    let selectedCard = null;
    let dragState = null;
    let audioContext = null;
    let suppressNextClick = false;

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function startRound() {
      roundQuestions = shuffle(QUESTIONS).slice(0, 5);
      questionIndex = 0;
      wrongAttempts = 0;
      result.classList.remove("open");
      showQuestion();
    }

    function showQuestion() {
      filledSlots = new Set();
      selectedCard = null;
      answerPanel.classList.remove("show");
      currentNumber.textContent = questionIndex + 1;
      renderIdiom();
      renderCards();
    }

    function renderIdiom() {
      const question = roundQuestions[questionIndex];
      idiomDisplay.innerHTML = "";

      [...question.成語].forEach((character, index) => {
        if (question.缺字.includes(index)) {
          const slotIndex = question.缺字.indexOf(index);
          const blank = document.createElement("div");
          blank.className = "blank";
          blank.dataset.slotIndex = slotIndex;
          blank.dataset.answer = question.答案[slotIndex];
          blank.setAttribute("aria-label", `第 ${slotIndex + 1} 個空格`);
          blank.addEventListener("click", () => {
            if (selectedCard) checkAnswer(selectedCard, blank);
          });
          idiomDisplay.appendChild(blank);
        } else {
          const text = document.createElement("div");
          text.className = "idiom-char";
          text.textContent = character;
          idiomDisplay.appendChild(text);
        }
      });
    }

    function renderCards() {
      const question = roundQuestions[questionIndex];
      const answers = [...question.答案];
      const forbidden = new Set([...question.成語, ...answers]);
      const distractors = shuffle(DISTRACTOR_POOL.filter((character) => !forbidden.has(character))).slice(0, 13);
      const cardCharacters = shuffle([...answers, ...distractors]);
      cardsGrid.innerHTML = "";

      cardCharacters.forEach((character, index) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "char-card";
        card.textContent = character;
        card.dataset.character = character;
        card.dataset.cardId = `${questionIndex}-${index}`;
        card.addEventListener("pointerdown", startPointerDrag);
        card.addEventListener("click", () => {
          if (suppressNextClick) {
            suppressNextClick = false;
            return;
          }
          selectCard(card);
        });
        cardsGrid.appendChild(card);
      });
    }

    function selectCard(card) {
      if (dragState?.moved || card.disabled) return;
      document.querySelectorAll(".char-card.selected").forEach((item) => item.classList.remove("selected"));
      document.querySelectorAll(".blank.selected-target").forEach((item) => item.classList.remove("selected-target"));

      if (selectedCard === card) {
        selectedCard = null;
        return;
      }

      selectedCard = card;
      card.classList.add("selected");
      document.querySelectorAll(".blank:not(.correct)").forEach((blank) => blank.classList.add("selected-target"));
    }

    function startPointerDrag(event) {
      const card = event.currentTarget;
      if (card.disabled) return;
      dragState = {
        pointerId: event.pointerId,
        card,
        startX: event.clientX,
        startY: event.clientY,
        moved: false,
        ghost: null,
        currentBlank: null
      };
      card.setPointerCapture(event.pointerId);
      card.addEventListener("pointermove", movePointerDrag);
      card.addEventListener("pointerup", endPointerDrag);
      card.addEventListener("pointercancel", cancelPointerDrag);
    }

    function movePointerDrag(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      const distance = Math.hypot(event.clientX - dragState.startX, event.clientY - dragState.startY);
      if (!dragState.moved && distance < 8) return;

      event.preventDefault();
      if (!dragState.moved) {
        dragState.moved = true;
        dragState.card.classList.add("drag-source");
        dragState.ghost = document.createElement("div");
        dragState.ghost.className = "drag-ghost";
        dragState.ghost.textContent = dragState.card.dataset.character;
        document.body.appendChild(dragState.ghost);
      }

      dragState.ghost.style.left = `${event.clientX}px`;
      dragState.ghost.style.top = `${event.clientY}px`;
      updateDragTarget(event.clientX, event.clientY);
    }

    function updateDragTarget(x, y) {
      const element = document.elementFromPoint(x, y);
      const blank = element?.closest(".blank:not(.correct)") || null;
      if (dragState.currentBlank !== blank) {
        dragState.currentBlank?.classList.remove("drag-over");
        blank?.classList.add("drag-over");
        dragState.currentBlank = blank;
      }
    }

    function endPointerDrag(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      if (dragState.moved && dragState.currentBlank) {
        checkAnswer(dragState.card, dragState.currentBlank);
      }
      cleanupDrag();
    }

    function cancelPointerDrag() {
      cleanupDrag();
    }

    function cleanupDrag() {
      if (!dragState) return;
      dragState.card.classList.remove("drag-source");
      dragState.currentBlank?.classList.remove("drag-over");
      dragState.ghost?.remove();
      dragState.card.removeEventListener("pointermove", movePointerDrag);
      dragState.card.removeEventListener("pointerup", endPointerDrag);
      dragState.card.removeEventListener("pointercancel", cancelPointerDrag);
      const moved = dragState.moved;
      dragState = null;
      if (moved) suppressNextClick = true;
    }

    function checkAnswer(card, blank) {
      if (!card || !blank || blank.classList.contains("correct")) return;
      const character = card.dataset.character;

      if (character === blank.dataset.answer) {
        blank.textContent = character;
        blank.classList.add("correct");
        blank.classList.remove("drag-over", "selected-target");
        card.disabled = true;
        card.style.visibility = "hidden";
        filledSlots.add(Number(blank.dataset.slotIndex));
        clearSelection();
        playBell();
        if (filledSlots.size === roundQuestions[questionIndex].缺字.length) {
          setTimeout(showExplanation, 350);
        }
      } else {
        wrongAttempts += 1;
        blank.classList.remove("wrong");
        void blank.offsetWidth;
        blank.classList.add("wrong");
        clearSelection();
      }
    }

    function clearSelection() {
      selectedCard = null;
      document.querySelectorAll(".char-card.selected").forEach((item) => item.classList.remove("selected"));
      document.querySelectorAll(".blank.selected-target").forEach((item) => item.classList.remove("selected-target"));
    }

    function playBell() {
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === "suspended") audioContext.resume();
      const now = audioContext.currentTime;
      [880, 1320].forEach((frequency, index) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.type = "sine";
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(.0001, now + index * .05);
        gain.gain.exponentialRampToValueAtTime(.13, now + index * .05 + .015);
        gain.gain.exponentialRampToValueAtTime(.0001, now + index * .05 + .35);
        oscillator.connect(gain).connect(audioContext.destination);
        oscillator.start(now + index * .05);
        oscillator.stop(now + index * .05 + .38);
      });
    }

    function showExplanation() {
      meaningText.textContent = `【${roundQuestions[questionIndex].成語}】${roundQuestions[questionIndex].意思}`;
      nextButton.textContent = questionIndex === 4 ? "查看成績" : "下一題";
      answerPanel.classList.add("show");
    }

    function nextQuestion() {
      if (questionIndex < 4) {
        questionIndex += 1;
        showQuestion();
      } else {
        localStorage.setItem("cert_idiom", "true");
        wrongTotalDisplay.textContent = wrongAttempts;
        result.classList.add("open");
        restartButton.focus();
      }
    }

    nextButton.addEventListener("click", nextQuestion);
    restartButton.addEventListener("click", startRound);
    startRound();
  </script>
</body>
</html>
